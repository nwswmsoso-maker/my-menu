<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شاورما أسطة عزوز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --g: #ffcc00; --b: #0a0a0a; --w: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--b); color: var(--w); margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        
        /* الأنيميشن الأصلي */
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .floating { position: absolute; font-size: 30px; opacity: 0.15; animation: fly 12s infinite linear; }
        @keyframes fly { 0% { transform: translateY(110vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }

        .flying-text {
            position: fixed; color: var(--g); font-weight: 700; font-size: 1.1rem;
            opacity: 0.2; white-space: nowrap; z-index: -1; pointer-events: none;
            animation: textFloat 20s infinite linear;
        }
        @keyframes textFloat {
            0% { transform: translate(-100%, 80vh); }
            100% { transform: translate(100vw, -20vh); }
        }

        header { text-align: center; padding: 30px 10px; border-bottom: 3px solid var(--g); background: rgba(0,0,0,0.9); }
        header h1 { font-size: 1.8rem; margin: 0; color: var(--g); }
        .addr { font-size: 0.8rem; color: #ccc; margin-top: 8px; line-height: 1.5; }

        .tabs { position: sticky; top: 0; background: #000; z-index: 1000; display: flex; overflow-x: auto; padding: 12px 5px; gap: 8px; border-bottom: 1px solid #333; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .t-btn { padding: 10px 20px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 50px; white-space: nowrap; font-family: 'Cairo'; cursor: pointer; font-size: 0.85rem; }
        .t-btn.active { background: var(--g); color: #000; font-weight: 900; box-shadow: 0 0 10px var(--g); }

        .container { padding: 15px; }
        .sec { display: none; }
        .sec.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 1.05rem; }
        .price { color: var(--g); font-weight: 900; font-size: 0.95rem; display: block; margin-top: 5px; }
        
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-add { background: var(--g); border: none; width: 38px; height: 38px; border-radius: 10px; font-weight: 900; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-sub { background: #222; color: #fff; border: 1px solid #444; width: 38px; height: 38px; border-radius: 10px; font-weight: 900; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .item-count { color: var(--g); font-weight: 900; min-width: 20px; text-align: center; }

        /* ستايل نافذة المعلومات */
        #orderModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; border: 2px solid var(--g); border-radius: 20px;
            padding: 25px; width: 90%; max-width: 400px; text-align: center;
        }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; font-family: 'Cairo'; outline: none; text-align: center; }
        .confirm-btn { background: #25d366; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.1rem; }

        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #25d366; color: #fff; padding: 22px; text-align: center; font-weight: 900; font-size: 1.3rem; text-decoration: none; z-index: 2000; border-top: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-animation" id="bg"></div>
    <div class="flying-text" style="animation-delay: 0s;">اطلب الآن من أسطة عزوز</div>

    <header>
        <h1>🌯 شاورما أسطة عزوز 🌯</h1>
        <div class="addr">📍 الرمادي - 5 كيلو - الشارع الخدمي - مجاور أسواق بيروت<br>📞 07819928088 | 07819944113</div>
    </header>

    <div class="tabs">
        <button class="t-btn active" onclick="sh('sh',this)">الگص والصاج</button>
        <button class="t-btn" onclick="sh('br',this)">البرجر والزنكر</button>
        <button class="t-btn" onclick="sh('kc',this)">الكنتاكي والكرسبي</button>
        <button class="t-btn" onclick="sh('pz',this)">البيتزا والمعجنات</button>
        <button class="t-btn" onclick="sh('rz',this)">الريزو</button>
        <button class="t-btn" onclick="sh('bf',this)">الفطور</button>
        <button class="t-btn" onclick="sh('ln',this)">الغداء</button>
        <button class="t-btn" onclick="sh('ff',this)">الفنكر والفلافل</button>
    </div>

    <div class="container" id="menu-body"></div>

    <div id="orderModal">
        <div class="modal-content">
            <h2 style="color:var(--g); font-size:1.2rem; margin-bottom:20px;">🚚 معلومات التوصيل</h2>
            <input type="text" id="custAddr" class="modal-input" placeholder="عنوانك / أقرب نقطة دالة">
            <input type="tel" id="custPhone" class="modal-input" placeholder="رقم الموبايل">
            <button class="confirm-btn" onclick="confirmOrder()">تأكيد وإرسال للواتساب</button>
            <p onclick="document.getElementById('orderModal').style.display='none'" style="color:#ff4444; margin-top:15px; cursor:pointer">إلغاء</p>
        </div>
    </div>

    <div class="cart-bar" onclick="sw()">إرسال للواتساب (<span id="tot">0</span> د.ع)</div>

    <script>
        // داتا الأكلات مالتك الأصلية بالحرف
        const menuData = {
            'sh': [ {n:'كص لحم', p:2000}, {n:'كص دجاج', p:1500}, {n:'نفر كص لحم', p:14000}, {n:'نفر كص دجاج', p:12000}, {n:'صاج لحم', p:2500}, {n:'صاج دجاج', p:2000}, {n:'وجبة صاج لحم', p:6000}, {n:'وجبة صاج دجاج', p:5000}, {n:'صاج إيطالي لحم', p:6000}, {n:'صاج إيطالي دجاج', p:5000} ],
            'br': [ {n:'ماستر لحم', p:4000}, {n:'ستيك دجاج', p:4000}, {n:'فاير فلر', p:4000}, {n:'زنكر', p:4000}, {n:'تويستر زنكر', p:4000}, {n:'فلر جبن', p:5000}, {n:'لغم برجر', p:6000}, {n:'برجر عادي', p:3000} ],
            'kc': [ {n:'كنتاكي 3 قطع', p:6000}, {n:'كنتاكي 5 قطع', p:10000}, {n:'كنتاكي 10 قطع', p:20000}, {n:'كرسبي', p:6000}, {n:'سكندر', p:5000} ],
            'pz': [ {n:'لحم بعجين عادي', p:2500}, {n:'لحم بعجين جبن', p:3000}, {n:'لحم بعجين دبل', p:5000}, {n:'بيتزا ص', p:5000}, {n:'بيتزا و', p:8000}, {n:'بيتزا ك', p:10000}, {n:'بيتزا فصول 4', p:12000}, {n:'بيتزا محشية', p:14000} ],
            'rz': [ {n:'ريزو أسطة عزوز', p:5000} ],
            'bf': [ {n:'مخلمة لحم', p:2500}, {n:'بيض ولحم', p:2500}, {n:'شوربة', p:2000}, {n:'باقلاء دهن حر', p:2500} ],
            'ln': [ {n:'تمن ومرق', p:3000}, {n:'ربع دجاج تمن', p:6000}, {n:'ربع دجاج ناشف', p:4000}, {n:'نص دجاج ناشف', p:7000}, {n:'دجاج كامل', p:14000} ],
            'ff': [ {n:'فنكر جبن', p:3000}, {n:'كوب فنكر', p:1000}, {n:'فنكر عادي', p:2500}, {n:'فلافل مشكل', p:1000}, {n:'صاج فلافل', p:1500}, {n:'وجبة فلافل', p:5000} ]
        };

        let cart = {}; let total = 0;

        function render() {
            const body = document.getElementById('menu-body');
            const activeTab = document.querySelector('.t-btn.active');
            const activeId = activeTab.onclick.toString().match(/'([^']+)'/)[1];
            body.innerHTML = '';
            for (let cat in menuData) {
                let section = document.createElement('div');
                section.id = cat;
                section.className = 'sec' + (cat === activeId ? ' active' : '');
                menuData[cat].forEach(item => {
                    let count = cart[item.n] ? cart[item.n].qty : 0;
                    section.innerHTML += `
                        <div class="card">
                            <div class="item-info"><span class="item-name">${item.n}</span><span class="price">${item.p.toLocaleString()} د.ع</span></div>
                            <div class="controls">
                                <button class="btn-sub" onclick="change('${item.n}', ${item.p}, -1)">-</button>
                                <span class="item-count">${count}</span>
                                <button class="btn-add" onclick="change('${item.n}', ${item.p}, 1)">+</button>
                            </div>
                        </div>`;
                });
                body.appendChild(section);
            }
        }

        function change(n, p, d) {
            if (!cart[n]) cart[n] = {qty: 0, p: p};
            cart[n].qty += d;
            if (cart[n].qty <= 0) delete cart[n];
            total += (p * d);
            document.getElementById('tot').innerText = total.toLocaleString();
            render();
        }

        function sh(id, btn) {
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
            window.scrollTo(0, 0);
        }

        function sw() {
            if (Object.keys(cart).length === 0) return alert("السلة فارغة يا أُسطه!");
            document.getElementById('orderModal').style.display = 'flex';
        }

        function confirmOrder() {
            const addr = document.getElementById('custAddr').value;
            const phone = document.getElementById('custPhone').value;
            if (!addr || !phone) return alert("يرجى كتابة العنوان والموبايل أولاً!");

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG', { hour: 'numeric', minute: 'numeric', hour12: true });

            let summary = Object.keys(cart).map(k => `🔸 ${k} (${cart[k].qty})`).join("\n");
            let finalMsg = `🛵 *طلب جديد* 🛵\n🕒 *الوقت:* ${timeStr}\n📍 *العنوان:* ${addr}\n📞 *الموبايل:* ${phone}\n---\n${summary}\n---\n💰 *المجموع:* ${total.toLocaleString()} د.ع`;
            
            // إرسال للرقم الأصلي (88) عبر api الرسمي لتجنب الشاشة البيضاء
            window.open("https://api.whatsapp.com/send?phone=9647819928088&text=" + encodeURIComponent(finalMsg), '_blank');
            document.getElementById('orderModal').style.display = 'none';
        }

        const bg = document.getElementById('bg');
        for (let i = 0; i < 15; i++) {
            const span = document.createElement('span');
            span.className = 'floating';
            span.innerText = ['🍔', '🍟'][Math.floor(Math.random()*2)];
            span.style.left = Math.random() * 100 + '%';
            span.style.animationDelay = Math.random() * 8 + 's';
            bg.appendChild(span);
        }
        render();
    </script>
</body>
</html>
